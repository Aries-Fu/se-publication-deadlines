name: Correct existing data
description: Report an incorrect deadline, venue, ranking, or source.
title: "[Correction]: "
labels:
  - data
  - correction
body:
  - type: input
    id: item
    attributes:
      label: Affected item
      description: Venue ID, deadline ID, or page row if known.
      placeholder: icse-2027-research-track
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong?
      description: Describe the incorrect field and current value.
      placeholder: The full paper deadline is listed as 2026-06-30, but the official page now says 2026-07-01.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Correct value
      description: Provide the corrected data.
      placeholder: |
        full_paper: 2026-07-01, Anywhere on Earth
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source URL
      placeholder: https://example.com/cfp
    validations:
      required: true
  - type: input
    id: checked_date
    attributes:
      label: Date checked
      description: Use YYYY-MM-DD.
      placeholder: 2026-05-02
    validations:
      required: true
  - type: checkboxes
    id: quality
    attributes:
      label: Data quality checklist
      options:
        - label: I checked the official or authoritative source.
          required: true
